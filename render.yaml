services:
  - type: web
    name: turfspace-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: turfspace-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://your-frontend.vercel.app
      - key: DB_PATH
        value: /opt/render/project/src/server/data/turfspace.db
      # Fill these in with your real Cloudinary credentials before deploying --
      # image upload will fail without them. sync: false means Render will
      # prompt you for the value rather than storing it in this file.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
